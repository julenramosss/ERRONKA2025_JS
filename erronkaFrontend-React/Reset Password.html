<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cambiar contraseña — pakAG</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-darkest:#0E0B16;--bg-dark:#1A1626;--bg-surface:#231D35;--bg-elevated:#2D2545;
  --accent-primary:#7C3AED;--accent-hover:#6D28D9;--accent-light:#A78BFA;--accent-subtle:#3D2960;
  --text-primary:#F5F3FF;--text-secondary:#A89DC4;--text-disabled:#6B5B8A;
  --border-normal:#3D3358;--border-focus:#7C3AED;
  --st-delivered-fg:#10B981;--st-delivered-bg:#0A2E20;
  --st-failed-fg:#EF4444;--st-failed-bg:#3D0F0F;
  --st-pending-fg:#F59E0B;--st-pending-bg:#3D2E0A;
}
html,body{min-height:100vh;background:linear-gradient(160deg,#0E0B16 0%,#1A1626 100%);color:var(--text-primary);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
a{color:var(--accent-light);text-decoration:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmerPulse{0%,100%{opacity:.6}50%{opacity:1}}
.fade-up{animation:fadeUp 380ms cubic-bezier(.2,.7,.2,1) both}
.fade-in{animation:fadeIn 260ms ease-out both}
.spin{animation:spin .9s linear infinite}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── tiny icon helper ── */
const Ic = ({ d, size=18, stroke=2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const Icons = {
  Lock:    <><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
  Eye:     <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>,
  EyeOff:  <><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></>,
  Check:   <><path d="M20 6 9 17l-5-5"/></>,
  X:       <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
  Arrow:   <><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>,
  Loader:  <><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></>,
  Shield:  <><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></>,
  Key:     <><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></>,
  Info:    <><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>,
  Mail:    <><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></>,
};

/* ── helpers ── */
const Logo = () => (
  <div style={{display:'flex',alignItems:'center',gap:10}}>
    <div style={{width:34,height:34,borderRadius:9,
      background:'linear-gradient(135deg,#A78BFA 0%,#7C3AED 55%,#4C1D95 100%)',
      display:'flex',alignItems:'center',justifyContent:'center',
      boxShadow:'0 4px 14px rgba(124,58,237,.45)'}}>
      <svg width={19} height={19} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>
      </svg>
    </div>
    <span style={{fontWeight:700,fontSize:17,letterSpacing:'-.02em'}}>
      pak<span style={{color:'var(--accent-light)'}}>AG</span>
    </span>
  </div>
);

const Glow = () => (
  <div style={{position:'fixed',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0}}>
    <div style={{position:'absolute',width:600,height:600,borderRadius:'50%',
      background:'#7C3AED',top:-180,right:-140,filter:'blur(100px)',opacity:.18}}/>
    <div style={{position:'absolute',width:400,height:400,borderRadius:'50%',
      background:'#3D2960',bottom:-100,left:-80,filter:'blur(80px)',opacity:.22}}/>
  </div>
);

/* password strength */
const getStrength = (pwd) => {
  let score = 0;
  if (pwd.length >= 8)  score++;
  if (pwd.length >= 12) score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;
  return score; // 0-5
};

const strengthMeta = [
  { label:'Muy débil',  color:'#EF4444', pct:20  },
  { label:'Débil',      color:'#F97316', pct:40  },
  { label:'Aceptable',  color:'#F59E0B', pct:60  },
  { label:'Buena',      color:'#84CC16', pct:80  },
  { label:'Excelente',  color:'#10B981', pct:100 },
];

const criteria = [
  { test: p => p.length >= 8,           label:'Mínimo 8 caracteres' },
  { test: p => /[A-Z]/.test(p),         label:'Una mayúscula' },
  { test: p => /[0-9]/.test(p),         label:'Un número' },
  { test: p => /[^A-Za-z0-9]/.test(p),  label:'Un símbolo (!@#…)' },
];

/* input component */
const PwdInput = ({ value, onChange, placeholder, error, id }) => {
  const [show, setShow] = useState(false);
  const [focused, setFocused] = useState(false);
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:10,
      background:'var(--bg-elevated)',
      border:`1px solid ${error ? 'var(--st-failed-fg)' : focused ? 'var(--accent-primary)' : 'var(--border-normal)'}`,
      borderRadius:8, height:46, padding:'0 14px',
      boxShadow: focused ? '0 0 0 3px rgba(124,58,237,.2)' : 'none',
      transition:'all 180ms',
    }}>
      <span style={{color:'var(--text-disabled)',display:'flex'}}><Ic d={Icons.Lock} size={16}/></span>
      <input id={id} type={show?'text':'password'} value={value} onChange={onChange}
        placeholder={placeholder} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
        style={{flex:1,background:'transparent',border:'none',outline:'none',
          color:'var(--text-primary)',fontSize:14,height:'100%'}}/>
      <button type="button" onClick={()=>setShow(s=>!s)}
        style={{color:'var(--text-secondary)',display:'flex',padding:2}}>
        <Ic d={show ? Icons.EyeOff : Icons.Eye} size={16}/>
      </button>
    </div>
  );
};

/* ── STATES ── */
const SCENE = {
  FORM:     'form',
  LOADING:  'loading',
  SUCCESS:  'success',
  EXPIRED:  'expired',
  ERROR:    'error',
};

const ResetPassword = () => {
  /* demo: read ?scene=xxx from URL to preview all states */
  const params = new URLSearchParams(window.location.search);
  const initScene = params.get('scene') || SCENE.FORM;
  const token = window.location.pathname.split('/').pop() || 'demo-token-abc123';

  const [scene,    setScene]    = useState(initScene);
  const [pwd,      setPwd]      = useState('');
  const [confirm,  setConfirm]  = useState('');
  const [touched,  setTouched]  = useState({});

  /* switcher for prototype */
  const [demoScene, setDemoScene] = useState(initScene);
  const switchScene = (s) => { setDemoScene(s); setScene(s); setPwd(''); setConfirm(''); setTouched({}); };

  const strength   = getStrength(pwd);
  const sm         = strengthMeta[Math.max(0, strength - 1)];
  const mismatch   = touched.confirm && confirm && pwd !== confirm;
  const allGood    = strength >= 3 && pwd === confirm && confirm.length > 0;

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!allGood) { setTouched({pwd:true,confirm:true}); return; }
    setScene(SCENE.LOADING);
    /* simulate API call */
    setTimeout(() => setScene(SCENE.SUCCESS), 1600);
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',padding:'24px 16px',position:'relative',zIndex:1}}>
      <Glow/>
      <div style={{width:'100%',maxWidth:460,zIndex:2,position:'relative'}}>

        {/* Logo */}
        <div style={{display:'flex',justifyContent:'center',marginBottom:28}}>
          <Logo/>
        </div>

        {/* Demo scene switcher */}
        <div style={{
          display:'flex',gap:2,padding:3,marginBottom:24,
          background:'rgba(45,37,69,.7)',backdropFilter:'blur(8px)',
          border:'1px solid var(--border-normal)',borderRadius:10,
          justifyContent:'center',
        }}>
          {[
            [SCENE.FORM,    'Formulario'],
            [SCENE.LOADING, 'Cargando'],
            [SCENE.SUCCESS, 'Éxito'],
            [SCENE.EXPIRED, 'Token caducado'],
            [SCENE.ERROR,   'Error'],
          ].map(([s,l])=>(
            <button key={s} onClick={()=>switchScene(s)} style={{
              padding:'5px 12px',borderRadius:7,fontSize:11,fontWeight:600,
              background: demoScene===s ? 'var(--accent-subtle)' : 'transparent',
              color: demoScene===s ? 'var(--accent-light)' : 'var(--text-disabled)',
              whiteSpace:'nowrap',transition:'all 160ms',
            }}>{l}</button>
          ))}
        </div>

        {/* ── FORM state ── */}
        {scene === SCENE.FORM && (
          <div className="fade-up" style={{
            background:'var(--bg-surface)',border:'1px solid var(--border-normal)',
            borderRadius:16,padding:32,boxShadow:'0 24px 64px rgba(0,0,0,.5)',
          }}>
            <div style={{textAlign:'center',marginBottom:28}}>
              <div style={{
                width:58,height:58,margin:'0 auto 14px',borderRadius:14,
                background:'linear-gradient(135deg,var(--accent-primary),#4C1D95)',
                display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:'0 10px 28px rgba(124,58,237,.4)',color:'white',
              }}><Ic d={Icons.Key} size={26}/></div>
              <h1 style={{fontSize:22,fontWeight:700,letterSpacing:'-.02em',marginBottom:6}}>
                Crea una nueva contraseña
              </h1>
              <p style={{color:'var(--text-secondary)',fontSize:13,lineHeight:1.5}}>
                Elige una contraseña segura para tu cuenta pakAG.
              </p>
            </div>

            <form onSubmit={handleSubmit}>
              {/* Nueva contraseña */}
              <div style={{marginBottom:16}}>
                <label style={{display:'block',fontSize:12,fontWeight:500,
                  color:'var(--text-secondary)',marginBottom:7,letterSpacing:'.01em'}}>
                  Nueva contraseña
                </label>
                <PwdInput value={pwd} onChange={e=>{setPwd(e.target.value);setTouched(t=>({...t,pwd:true}))}}
                  placeholder="Mínimo 8 caracteres" id="pwd"/>

                {/* Strength bar */}
                {pwd && (
                  <div style={{marginTop:10}} className="fade-in">
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,
                      fontSize:11,color:sm.color,fontWeight:600}}>
                      <span>{sm.label}</span>
                      <span>{strength}/5</span>
                    </div>
                    <div style={{height:5,borderRadius:9999,background:'var(--bg-elevated)',overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${sm.pct}%`,background:sm.color,
                        borderRadius:9999,transition:'all 280ms cubic-bezier(.2,.7,.2,1)'}}/>
                    </div>
                    {/* Criteria checklist */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:10}}>
                      {criteria.map((c,i)=>{
                        const ok = c.test(pwd);
                        return (
                          <div key={i} style={{display:'flex',alignItems:'center',gap:6,
                            fontSize:11,color: ok ? 'var(--st-delivered-fg)' : 'var(--text-disabled)'}}>
                            <span style={{width:14,height:14,borderRadius:'50%',flexShrink:0,
                              background: ok ? 'var(--st-delivered-bg)' : 'var(--bg-elevated)',
                              border:`1px solid ${ok ? 'var(--st-delivered-fg)' : 'var(--border-normal)'}`,
                              display:'flex',alignItems:'center',justifyContent:'center',
                              transition:'all 180ms'}}>
                              {ok && <Ic d={Icons.Check} size={9} stroke={3}/>}
                            </span>
                            {c.label}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>

              {/* Confirmar contraseña */}
              <div style={{marginBottom:24}}>
                <label style={{display:'block',fontSize:12,fontWeight:500,
                  color:'var(--text-secondary)',marginBottom:7}}>
                  Confirmar contraseña
                </label>
                <PwdInput value={confirm}
                  onChange={e=>{setConfirm(e.target.value);setTouched(t=>({...t,confirm:true}))}}
                  placeholder="Repite la contraseña" id="confirm"
                  error={mismatch}/>
                {mismatch && (
                  <div className="fade-in" style={{
                    display:'flex',alignItems:'center',gap:6,marginTop:7,
                    fontSize:12,color:'var(--st-failed-fg)',
                  }}>
                    <Ic d={Icons.X} size={13} stroke={2.5}/> Las contraseñas no coinciden
                  </div>
                )}
                {touched.confirm && confirm && pwd===confirm && (
                  <div className="fade-in" style={{
                    display:'flex',alignItems:'center',gap:6,marginTop:7,
                    fontSize:12,color:'var(--st-delivered-fg)',
                  }}>
                    <Ic d={Icons.Check} size={13} stroke={2.5}/> Las contraseñas coinciden
                  </div>
                )}
              </div>

              <button type="submit" style={{
                width:'100%',height:46,borderRadius:9,
                background: allGood ? 'var(--accent-primary)' : 'var(--accent-subtle)',
                color: allGood ? 'white' : 'var(--text-disabled)',
                fontWeight:600,fontSize:14,
                display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                boxShadow: allGood ? '0 4px 18px rgba(124,58,237,.4)' : 'none',
                transition:'all 200ms',cursor: allGood ? 'pointer' : 'not-allowed',
              }}>
                Cambiar contraseña
                <Ic d={Icons.Arrow} size={16}/>
              </button>
            </form>

            <div style={{textAlign:'center',marginTop:18,fontSize:12,color:'var(--text-disabled)'}}>
              Token: <span style={{fontFamily:'monospace',color:'var(--text-secondary)',fontSize:11}}>
                {token.length > 20 ? token.slice(0,20)+'…' : token}
              </span>
            </div>
          </div>
        )}

        {/* ── LOADING state ── */}
        {scene === SCENE.LOADING && (
          <div className="fade-in" style={{
            background:'var(--bg-surface)',border:'1px solid var(--border-normal)',
            borderRadius:16,padding:40,textAlign:'center',
            boxShadow:'0 24px 64px rgba(0,0,0,.5)',
          }}>
            <div style={{
              width:62,height:62,margin:'0 auto 20px',borderRadius:'50%',
              border:'3px solid var(--border-normal)',
              borderTop:'3px solid var(--accent-primary)',
              animation:'spin .9s linear infinite',
            }}/>
            <div style={{fontSize:16,fontWeight:600,marginBottom:6}}>Actualizando contraseña…</div>
            <div style={{fontSize:13,color:'var(--text-secondary)'}}>Estamos guardando tus cambios de forma segura.</div>
          </div>
        )}

        {/* ── SUCCESS state ── */}
        {scene === SCENE.SUCCESS && (
          <div className="fade-up" style={{
            background:'var(--bg-surface)',border:'1px solid var(--border-normal)',
            borderRadius:16,padding:36,textAlign:'center',
            boxShadow:'0 24px 64px rgba(0,0,0,.5)',
          }}>
            <div style={{
              width:72,height:72,margin:'0 auto 20px',borderRadius:18,
              background:'var(--st-delivered-bg)',
              border:'1px solid rgba(16,185,129,.25)',
              display:'flex',alignItems:'center',justifyContent:'center',color:'var(--st-delivered-fg)',
              boxShadow:'0 0 40px rgba(16,185,129,.2)',
            }}>
              <Ic d={Icons.Check} size={34} stroke={2.5}/>
            </div>
            <h2 style={{fontSize:22,fontWeight:700,letterSpacing:'-.02em',marginBottom:8}}>
              ¡Contraseña actualizada!
            </h2>
            <p style={{color:'var(--text-secondary)',fontSize:13,marginBottom:24,lineHeight:1.55}}>
              Tu contraseña se ha cambiado correctamente.<br/>Ya puedes iniciar sesión con tus nuevas credenciales.
            </p>
            <a href="/login" style={{
              display:'inline-flex',alignItems:'center',gap:8,
              padding:'11px 22px',borderRadius:9,
              background:'var(--accent-primary)',color:'white',
              fontWeight:600,fontSize:14,
              boxShadow:'0 4px 18px rgba(124,58,237,.4)',
            }}>
              Ir al inicio de sesión <Ic d={Icons.Arrow} size={16}/>
            </a>
            <div style={{marginTop:18,fontSize:12,color:'var(--text-disabled)'}}>
              Por seguridad, se han cerrado todas las demás sesiones.
            </div>
          </div>
        )}

        {/* ── EXPIRED state ── */}
        {scene === SCENE.EXPIRED && (
          <div className="fade-up" style={{
            background:'var(--bg-surface)',border:'1px solid var(--border-normal)',
            borderRadius:16,padding:36,textAlign:'center',
            boxShadow:'0 24px 64px rgba(0,0,0,.5)',
          }}>
            <div style={{
              width:72,height:72,margin:'0 auto 20px',borderRadius:18,
              background:'var(--st-pending-bg)',
              border:'1px solid rgba(245,158,11,.25)',
              display:'flex',alignItems:'center',justifyContent:'center',color:'var(--st-pending-fg)',
            }}>
              <svg width={34} height={34} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <h2 style={{fontSize:22,fontWeight:700,letterSpacing:'-.02em',marginBottom:8}}>
              Enlace caducado
            </h2>
            <p style={{color:'var(--text-secondary)',fontSize:13,marginBottom:24,lineHeight:1.55}}>
              Este enlace de recuperación ha expirado o ya fue utilizado.<br/>
              Los enlaces son válidos durante <strong style={{color:'var(--text-primary)'}}>30 minutos</strong>.
            </p>
            <button onClick={()=>switchScene(SCENE.FORM)} style={{
              display:'inline-flex',alignItems:'center',gap:8,
              padding:'11px 22px',borderRadius:9,
              background:'var(--accent-primary)',color:'white',
              fontWeight:600,fontSize:14,
              boxShadow:'0 4px 18px rgba(124,58,237,.4)',
            }}>
              Solicitar nuevo enlace <Ic d={Icons.Mail} size={16}/>
            </button>
            <div style={{marginTop:18,fontSize:12,color:'var(--text-disabled)'}}>
              ¿Necesitas ayuda? <a href="mailto:soporte@pakag.com">soporte@pakag.com</a>
            </div>
          </div>
        )}

        {/* ── ERROR state ── */}
        {scene === SCENE.ERROR && (
          <div className="fade-up" style={{
            background:'var(--bg-surface)',border:'1px solid var(--border-normal)',
            borderRadius:16,padding:36,textAlign:'center',
            boxShadow:'0 24px 64px rgba(0,0,0,.5)',
          }}>
            <div style={{
              width:72,height:72,margin:'0 auto 20px',borderRadius:18,
              background:'var(--st-failed-bg)',
              border:'1px solid rgba(239,68,68,.25)',
              display:'flex',alignItems:'center',justifyContent:'center',color:'var(--st-failed-fg)',
            }}>
              <Ic d={Icons.X} size={34} stroke={2.5}/>
            </div>
            <h2 style={{fontSize:22,fontWeight:700,letterSpacing:'-.02em',marginBottom:8}}>
              Algo ha ido mal
            </h2>
            <p style={{color:'var(--text-secondary)',fontSize:13,marginBottom:24,lineHeight:1.55}}>
              No hemos podido actualizar tu contraseña.<br/>
              Por favor inténtalo de nuevo o contacta con soporte.
            </p>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button onClick={()=>switchScene(SCENE.FORM)} style={{
                padding:'11px 20px',borderRadius:9,
                background:'var(--bg-elevated)',color:'var(--text-primary)',
                fontWeight:600,fontSize:13,
                border:'1px solid var(--border-normal)',
              }}>
                Reintentar
              </button>
              <a href="mailto:soporte@pakag.com" style={{
                display:'inline-flex',alignItems:'center',gap:8,
                padding:'11px 20px',borderRadius:9,
                background:'var(--accent-primary)',color:'white',
                fontWeight:600,fontSize:13,
              }}>
                Contactar soporte
              </a>
            </div>
          </div>
        )}

        <div style={{textAlign:'center',marginTop:20,fontSize:11,color:'var(--text-disabled)'}}>
